site_name: MML Exercise Answers
site_description: Worked end-of-chapter exercise solutions for Mathematics for Machine Learning
site_author: Anna
site_url: https://anp-exe.github.io/mml-excerises/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.integrate
    - content.code.copy
    - search.highlight
  font:
    text: Nunito
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anp-exe

nav:
  - Home: index.md
  - "Ch 2 · Linear Algebra": chapters/ch2.md
  - "Ch 3 · Analytic Geometry": chapters/ch3.md
  - "Ch 4 · Matrix Decompositions": chapters/ch4.md
  - "Ch 5 · Vector Calculus": chapters/ch5.md
  - "Ch 6 · Probability & Distributions": chapters/ch6.md
  - "Ch 7 · Continuous Optimization": chapters/ch7.md
  - "Ch 8 · When Models Meet Data": chapters/ch8.md
  - "Ch 9 · Linear Regression": chapters/ch9.md
  - "Ch 10 · Dimensionality Reduction (PCA)": chapters/ch10.md
  - "Ch 11 · Density Estimation (GMM)": chapters/ch11.md
  - "Ch 12 · Classification (SVM)": chapters/ch12.md
